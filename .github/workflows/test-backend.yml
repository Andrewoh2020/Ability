name: Test Backend

permissions: {}

on:
  pull_request:
    paths:
      - "backend/**"

defaults:
  run:
    shell: bash
    working-directory: ./backend

jobs:
  test:
    name: Test
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set python version to 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml
      - run: pip install -e '.[test]'
      - run: pytest --ignore=tests/utils/test_lock.py -q tests/
