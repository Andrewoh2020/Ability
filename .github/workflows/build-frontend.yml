name: Build Frontend

env:
  NODE_OPTIONS: --max-old-space-size=4096

permissions: {}

on:
  pull_request:
    paths:
      - "frontend/src/**"
  workflow_dispatch:

defaults:
  run:
    shell: bash
    working-directory: ./frontend

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      packages: read
      statuses: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set node version to 20
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
